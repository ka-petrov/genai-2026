# Dev overrides — auto-loaded by `docker compose up`.
# Exposes backend and Redis ports to the host for local testing.
services:
  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uv", "run", "fastapi", "dev", "app/main.py", "--port", "8000", "--host", "0.0.0.0"]

  redis:
    ports:
      - "6380:6379"

  nginx:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
