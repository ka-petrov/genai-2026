server {
    listen 80;
    server_name gengeo.constp.dev;

    # Let certbot webroot renewals through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name gengeo.constp.dev;

    ssl_certificate     /etc/letsencrypt/live/gengeo.constp.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gengeo.constp.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # API — reverse proxy to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming: no buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # Frontend static assets
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
